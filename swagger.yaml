                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: |
            Échec de l'authentification
            - Email ou mot de passe incorrect
            - Compte bloqué
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Email ou mot de passe incorrect"

  /livreurs/{id}:
    get:
      summary: Récupérer un livreur par ID
      description: |
        Récupérer les détails complets d'un livreur spécifique.
        
        **Inclus :**
        - Informations du livreur
        - Région associée
        - Liste des commandes assignées
        - Détails des produits et GIE pour chaque commande
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du livreur
          required: true
          schema:
            type: string
            example: "livreur-123"
      responses:
        '200':
          description: Livreur récupéré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Livreur récupéré avec succès"
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Livreur'
                      - type: object
                        properties:
                          region:
                            $ref: '#/components/schemas/Region'
                          commandes:
                            type: array
                            items:
                              $ref: '#/components/schemas/Commande'
        '404':
          description: Livreur non trouvé
        '401':
          description: Non autorisé - Token JWT manquant ou invalide

    put:
      summary: Mettre à jour un livreur
      description: |
        Modifier les informations d'un livreur.
        
        **Fonctionnalités :**
        - Mise à jour des informations personnelles
        - Changement de statut
        - Association/désassociation de région
        - Validation des données
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du livreur à modifier
          required: true
          schema:
            type: string
            example: "livreur-123"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLivreurDto'
      responses:
        '200':
          description: Livreur mis à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Livreur mis à jour avec succès"
                  data:
                    $ref: '#/components/schemas/Livreur'
        '400':
          description: |
            Données invalides
            - Région introuvable
            - Données manquantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Région introuvable"
        '404':
          description: Livreur non trouvé
        '401':
          description: Non autorisé - Token JWT manquant ou invalide

    delete:
      summary: Supprimer un livreur (Admin seulement)
      description: |
        Supprimer définitivement un livreur. **Réservé aux administrateurs uniquement.**
        
        **Attention :** Cette action est irréversible.
        
        **Vérifications :**
        - Le livreur ne doit pas avoir de commandes en cours
        - Le livreur doit être en statut DISPONIBLE ou INDISPONIBLE
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du livreur à supprimer
          required: true
          schema:
            type: string
            example: "livreur-123"
      responses:
        '200':
          description: Livreur supprimé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Livreur supprimé avec succès"
        '404':
          description: Livreur non trouvé
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Admin requis

  /livreurs/{id}/commandes:
    get:
      summary: Récupérer les commandes d'un livreur
      description: |
        Récupérer toutes les commandes assignées à un livreur spécifique.
        
        **Fonctionnalités :**
        - Liste paginée des commandes
        - Tri par date de commande (plus récentes en premier)
        - Inclut les détails complets : client, produits, GIE, paiement
        - Filtrage par statut possible
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du livreur
          required: true
          schema:
            type: string
            example: "livreur-123"
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Commandes du livreur récupérées avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Commandes récupérées avec succès"
                  data:
                    type: object
                    properties:
                      commandes:
                        type: array
                        items:
                          $ref: '#/components/schemas/Commande'
                      total:
                        type: integer
                        example: 15
                      pages:
                        type: integer
                        example: 1
        '404':
          description: Livreur non trouvé
        '401':
          description: Non autorisé - Token JWT manquant ou invalide

  /livreurs/commandes-disponibles:
    get:
      summary: Récupérer les commandes disponibles (tous GIE)
      description: |
        Récupérer **toutes** les commandes disponibles pour les livreurs, peu importe le GIE.
        
        **Service de livraison centralisé :**
        - Les livreurs voient toutes les commandes de tous les GIE
        - Chaque commande contient les informations du GIE pour contact
        - Les livreurs peuvent choisir les commandes à livrer
        - **Aucun filtre de région obligatoire** - toutes les commandes sont visibles
        
        **Fonctionnalités :**
        - Commandes sans livreur assigné (statut CONFIRMEE, EN_ATTENTE ou EN_PREPARATION)
        - **Service centralisé** : Toutes les commandes de tous les GIE sont visibles
        - Inclut les informations complètes : client, GIE, produits, adresse
        - Tri par date de création (plus récentes en premier)
        - Informations de contact GIE pour chaque produit
        - Montants et frais de livraison calculés
        
        **Service centralisé :**
        - **Accès universel** : Toutes les commandes disponibles de tous les GIE
        - **Aucun filtre** : Les livreurs voient toutes les opportunités de livraison
        - **Choix libre** : Les livreurs choisissent les commandes à livrer
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Commandes disponibles récupérées avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Commandes disponibles récupérées avec succès"
                  data:
                    type: object
                    properties:
                      commandes:
                        type: array
                        items:
                          $ref: '#/components/schemas/Commande'
                      total:
                        type: integer
                        example: 8
                      pages:
                        type: integer
                        example: 1
        '401':
          description: Non autorisé - Token JWT manquant ou invalide

  /livreurs/assigner-commande:
    post:
      summary: Assigner une commande à un livreur
      description: |
        Assigner une commande disponible à un livreur.
        
        **Fonctionnalités :**
        - Vérification de la disponibilité du livreur
        - Vérification que la commande n'est pas déjà assignée
        - Mise à jour automatique du statut du livreur
        - Validation des permissions
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - commandeId
              properties:
                commandeId:
                  type: string
                  description: ID de la commande à assigner
                  example: "commande-456"
      responses:
        '200':
          description: Commande assignée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Commande assignée avec succès"
        '400':
          description: |
            Erreur d'assignation
            - Livreur introuvable
            - Commande introuvable
            - Commande déjà assignée
            - Livreur non disponible
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Livreur non disponible"
        '401':
          description: Non autorisé - Token JWT manquant ou invalide

  /livreurs/marquer-livree:
    post:
      summary: Marquer une commande comme livrée
      description: |
        Marquer une commande assignée comme livrée.
        
        **Fonctionnalités :**
        - Vérification que la commande est assignée au livreur
        - Mise à jour du statut de la commande
        - Remise du livreur en statut DISPONIBLE
        - Enregistrement de la date de livraison
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - commandeId
              properties:
                commandeId:
                  type: string
                  description: ID de la commande à marquer comme livrée
                  example: "commande-456"
      responses:
        '200':
          description: Commande marquée comme livrée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Commande marquée comme livrée avec succès"
        '400':
          description: |
            Erreur de mise à jour
            - commandeId manquant
            - Commande introuvable
            - Commande non assignée à ce livreur
            - Erreur de mise à jour du statut
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    examples:
                      - "commandeId est requis"
                      - "Commande introuvable ou non assignée à ce livreur"
                      - "Erreur lors de la mise à jour du statut"
        '401':
          description: Non autorisé - Token JWT manquant ou invalide

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Administrateur:
      type: object
      properties:
        id:
          type: string
          example: "clx1234567890abcdef"
        email:
          type: string
          format: email
          example: "admin@gie.com"
        nom:
          type: string
          example: "Admin"
        prenom:
          type: string
          example: "Normal"
        telephone:
          type: string
          example: "+1234567890"
        role:
          type: string
          enum: [ADMIN, SUPER_ADMIN]
          example: "ADMIN"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAdministrateurDto:
      type: object
      required:
        - email
        - password
        - nom
        - prenom
      properties:
        email:
          type: string
          format: email
          example: "admin@gie.com"
        password:
          type: string
          example: "admin123"
        nom:
          type: string
          example: "Admin"
        prenom:
          type: string
          example: "Normal"
        telephone:
          type: string
          example: "+1234567890"
        role:
          type: string
          enum: [ADMIN, SUPER_ADMIN]
          default: "ADMIN"
          example: "ADMIN"

    Client:
      type: object
      properties:
        id:
          type: string
          example: "clx1234567890abcdef"
        email:
          type: string
          format: email
          example: "client@example.com"
        nom:
          type: string
          example: "Dupont"
        prenom:
          type: string
          example: "Jean"
        telephone:
          type: string
          example: "+1234567890"
        adresse:
          type: string
          example: "123 Rue du Client, Ville"
        statut:
          type: string
          enum: [ACTIF, INACTIF, BLOQUE]
          example: "ACTIF"
        administrateurId:
          type: string
          example: "clx1234567890abcdef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateClientDto:
      type: object
      required:
        - email
        - password
        - nom
        - prenom
      properties:
        email:
          type: string
          format: email
          example: "client@example.com"
        password:
          type: string
          example: "client123"
        nom:
          type: string
          example: "Dupont"
        prenom:
          type: string
          example: "Jean"
        telephone:
          type: string
          example: "+1234567890"
        adresse:
          type: string
          example: "123 Rue du Client, Ville"
        administrateurId:
          type: string
          example: "clx1234567890abcdef"

    GIE:
      type: object
      properties:
        id:
          type: string
          example: "clx1234567890abcdef"
        nom:
          type: string
          example: "GIE Agricole du Nord"
        description:
          type: string
          example: "Groupement d'intérêt économique spécialisé dans l'agriculture"
        adresse:
          type: string
          example: "123 Rue des Agriculteurs, Nord"
        telephone:
          type: string
          example: "+1234567890"
        email:
          type: string
          format: email
          example: "contact@gie-agricole.com"
        logo:
          type: string
          example: "https://example.com/logo.png"
        statut:
          type: string
          enum: [ACTIF, INACTIF, SUSPENDU]
          example: "ACTIF"
        regionId:
          type: string
          description: ID de la région associée (optionnel)
          example: "region-dakar"
        administrateurId:
          type: string
          example: "clx1234567890abcdef"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        region:
          $ref: '#/components/schemas/Region'

    CreateGIEDto:
      type: object
      required:
        - nom
      properties:
        nom:
          type: string
          example: "GIE Agricole du Nord"
        description:
          type: string
          example: "Groupement d'intérêt économique spécialisé dans l'agriculture"
        adresse:
          type: string
          example: "123 Rue des Agriculteurs, Nord"
        telephone:
          type: string
          example: "+1234567890"
        email:
          type: string
          format: email
          example: "contact@gie-agricole.com"
        logo:
          type: string
          example: "https://example.com/logo.png"
        regionId:
          type: string
          description: ID de la région associée (optionnel)
          example: "region-dakar"

    Categorie:
      type: object
      properties:
        id:
          type: string
          example: "cat_legumes"
        nom:
          type: string
          example: "Légumes"
        description:
          type: string
          example: "Légumes frais et biologiques"
        couleur:
          type: string
          description: Code couleur hexadécimal
          example: "#22C55E"
        image:
          type: string
          description: URL de l'image de la catégorie
          example: "https://res.cloudinary.com/dtpvh5zrk/image/upload/v1753962805/produits/legumes.jpg"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        produits:
          type: array
          description: Liste des produits de cette catégorie (optionnel)
          items:
            type: object
            properties:
              id:
                type: string
              nom:
                type: string
              prix:
                type: number
              stock:
                type: integer
              statut:
                type: string
        _count:
          type: object
          description: Nombre de produits dans cette catégorie (optionnel)
          properties:
            produits:
              type: integer
              example: 15

    CreateCategorieDto:
      type: object
      required:
        - nom
      properties:
        nom:
          type: string
          description: Nom de la catégorie (doit être unique)
          example: "Légumes"
        description:
          type: string
          description: Description de la catégorie
          example: "Légumes frais et biologiques"
        couleur:
          type: string
          description: Code couleur hexadécimal
          example: "#22C55E"
        image:
          type: string
          description: URL de l'image de la catégorie
          example: "https://res.cloudinary.com/dtpvh5zrk/image/upload/v1753962805/produits/legumes.jpg"

    Produit:
      type: object
      properties:
        id:
          type: string
          example: "clx1234567890abcdef"
        nom:
          type: string
          example: "Tomates Bio"
        description:
          type: string
          example: "Tomates biologiques fraîches du jardin"
        prix:
          type: number
          format: float
          example: 2.50
        stock:
          type: integer
          example: 100
        image:
          type: string
          description: URL de l'image du produit (Cloudinary)
          example: "https://res.cloudinary.com/your-cloud/image/upload/v1234567890/produits/tomates-bio.jpg"
        statut:
          type: string
          enum: [DISPONIBLE, RUPTURE, HORS_STOCK]
          example: "DISPONIBLE"
        gieId:
          type: string
          example: "clx1234567890abcdef"
        categorieId:
          type: string
          description: ID de la catégorie du produit (optionnel)
          example: "cat_legumes"
        categorie:
          $ref: '#/components/schemas/Categorie'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProduitDto:
      type: object
      required:
        - nom
        - prix
        - stock
        - gieId
      properties:
        nom:
          type: string
          example: "Tomates Bio"
        description:
          type: string
          example: "Tomates biologiques fraîches du jardin"
        prix:
          type: number
          format: float
          minimum: 0
          example: 2.50
        stock:
          type: integer
          minimum: 0
          example: 100
        image:
          type: string
          description: URL de l'image du produit (Cloudinary)
          example: "https://res.cloudinary.com/your-cloud/image/upload/v1234567890/produits/tomates-bio.jpg"
        categorieId:
          type: string
          description: ID de la catégorie du produit (optionnel)
          example: "cat_legumes"
        gieId:
          type: string
          example: "clx1234567890abcdef"

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 10

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Une erreur s'est produite"
        error:
          type: string
          example: "Détails de l'erreur"

    Commande:
      type: object
      properties:
        id:
          type: string
          example: "commande-123"
        numero:
          type: string
          example: "CMD-2024-001"
        montant:
          type: number
          format: float
          example: 15000
        fraisLivraison:
          type: number
          format: float
          description: Frais de livraison en FCFA
          example: 500
        statut:
          type: string
          enum: [EN_ATTENTE, CONFIRMEE, EN_PREPARATION, EXPEDIEE, LIVREE, ANNULEE]
          example: "EN_ATTENTE"
        dateCommande:
          type: string
          format: date-time
        dateLivraison:
          type: string
          format: date-time
        adresseLivraison:
          type: string
          example: "123 Rue de la Livraison, Dakar"
        regionLivraisonId:
          type: string
          description: ID de la région de livraison
          example: "region-dakar"
        livreurId:
          type: string
          description: ID du livreur assigné à cette commande
          example: "livreur-123"
        clientId:
          type: string
          example: "client-123"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        regionLivraison:
          $ref: '#/components/schemas/Region'
        livreur:
          $ref: '#/components/schemas/Livreur'
        produits:
          type: array
          items:
            type: object
            properties:
              produitId:
                type: string
              quantite:
                type: integer

    StatutGIEProduit:
      type: string
      enum: [EN_ATTENTE, EN_PREPARATION, PRET, ANNULE]
      description: |
        Statuts possibles pour un produit dans une commande multi-GIE
        
        - **EN_ATTENTE** : Commande reçue, en attente de traitement par le GIE
        - **EN_PREPARATION** : Le GIE a commencé la préparation du produit
        - **PRET** : Le produit est prêt pour la livraison
        - **ANNULE** : Le produit a été annulé (rupture de stock, etc.)

    PanierProduitMultiGIE:
      type: object
      properties:
        id:
          type: string
          example: "pp_123"
        quantite:
          type: integer
          example: 2
        prixUnitaire:
          type: number
          example: 500.0
        statutGIE:
          $ref: '#/components/schemas/StatutGIEProduit'
        dateConfirmation:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
          description: "Date de confirmation par le GIE (si PRET)"
        produit:
          $ref: '#/components/schemas/Produit'

    DetailsGIE:
      type: object
      properties:
        totalProduits:
          type: integer
          example: 3
          description: "Nombre total de produits du GIE dans la commande"
        produitsPrets:
          type: integer
          example: 1
          description: "Nombre de produits marqués comme PRET"
        produitsEnPreparation:
          type: integer
          example: 1
          description: "Nombre de produits en cours de préparation"
        produitsEnAttente:
          type: integer
          example: 1
          description: "Nombre de produits en attente de traitement"
        produitsAnnules:
          type: integer
          example: 0
          description: "Nombre de produits annulés"
        montantGIE:
          type: number
          example: 2500.0
          description: "Montant total des produits du GIE dans la commande"
        progression:
          type: number
          example: 33.33
          description: "Pourcentage de progression (0-100)"

    CommandeMultiGIE:
      type: object
      properties:
        id:
          type: string
          example: "cmd_123"
        numero:
          type: string
          example: "CMD-123"
        statut:
          type: string
          enum: [EN_ATTENTE, CONFIRMEE, EN_PREPARATION, EXPEDIEE, LIVREE, ANNULEE]
          description: "Statut global de la commande (calculé automatiquement)"
        client:
          $ref: '#/components/schemas/Client'
        panierProduits:
          type: array
          items:
            $ref: '#/components/schemas/PanierProduitMultiGIE'
        detailsGIE:
          $ref: '#/components/schemas/DetailsGIE'
        dateCommande:
          type: string
          format: date-time
        montant:
          type: number
