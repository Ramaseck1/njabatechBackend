          required: true
          schema:
            type: string
            example: "cat_legumes"
      responses:
        '200':
          description: Catégorie récupérée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Catégorie récupérée avec succès"
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Categorie'
                      - type: object
                        properties:
                          produits:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                nom:
                                  type: string
                                prix:
                                  type: number
                                stock:
                                  type: integer
                                statut:
                                  type: string
        '404':
          description: Catégorie non trouvée
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Catégorie non trouvée"

    put:
      summary: Mettre à jour une catégorie
      description: |
        Modifier les informations d'une catégorie existante avec possibilité d'upload d'image (authentification Admin requise).
        
        **Validation :**
        - Le nom doit rester unique s'il est modifié
        - Tous les champs sont optionnels
        - Si une nouvelle image est fournie, elle sera uploadée vers Cloudinary
        - L'ancienne image sera conservée si aucune nouvelle n'est fournie
        
        **Format :** multipart/form-data pour l'upload d'image
        
        **Exemples d'utilisation :**
        
        **Mise à jour sans image (JSON) :**
        ```bash
        curl -X PUT \
          http://localhost:3003/api/categories/cat_legumes \
          -H 'Authorization: Bearer <your-jwt-token>' \
          -H 'Content-Type: application/json' \
          -d '{
            "nom": "Légumes Bio",
            "description": "Légumes biologiques et frais",
            "couleur": "#16A34A"
          }'
        ```
        
        **Mise à jour avec nouvelle image :**
        ```bash
        curl -X PUT \
          http://localhost:3003/api/categories/cat_legumes \
          -H 'Authorization: Bearer <your-jwt-token>' \
          -F 'nom=Légumes Bio' \
          -F 'description=Légumes biologiques et frais' \
          -F 'couleur=#16A34A' \
          -F 'image=@/path/to/new-image.jpg'
        ```
      tags:
        - Catégories
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID de la catégorie à modifier
          required: true
          schema:
            type: string
            example: "cat_legumes"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nom:
                  type: string
                  description: Nouveau nom de la catégorie
                  example: "Légumes Bio"
                description:
                  type: string
                  description: Nouvelle description
                  example: "Légumes biologiques et frais"
                couleur:
                  type: string
                  description: Nouvelle couleur
                  example: "#16A34A"
                image:
                  type: string
                  format: binary
                  description: Nouvelle image de la catégorie (JPG, PNG, GIF, WebP - Max 10MB)
      responses:
        '200':
          description: Catégorie mise à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Catégorie mise à jour avec succès"
                  data:
                    $ref: '#/components/schemas/Categorie'
              examples:
                mise_a_jour_sans_image:
                  summary: Mise à jour sans image
                  value:
                    success: true
                    message: "Catégorie mise à jour avec succès"
                    data:
                      id: "cat_legumes"
                      nom: "Légumes Bio"
                      description: "Légumes biologiques et frais"
                      couleur: "#16A34A"
                      image: "https://res.cloudinary.com/dtpvh5zrk/image/upload/v1753962805/categories/legumes.jpg"
                      createdAt: "2025-01-15T10:00:00.000Z"
                      updatedAt: "2025-01-15T15:30:00.000Z"
                mise_a_jour_avec_image:
                  summary: Mise à jour avec nouvelle image
                  value:
                    success: true
                    message: "Catégorie mise à jour avec succès"
                    data:
                      id: "cat_legumes"
                      nom: "Légumes Bio"
                      description: "Légumes biologiques et frais"
                      couleur: "#16A34A"
                      image: "https://res.cloudinary.com/dtpvh5zrk/image/upload/v1755282889/categories/kq0ao56tjc7qyfqurizt.png"
                      createdAt: "2025-01-15T10:00:00.000Z"
                      updatedAt: "2025-01-15T15:30:00.000Z"
        '400':
          description: |
            Données invalides
            - Nom de catégorie déjà existant
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Une catégorie avec ce nom existe déjà"
        '404':
          description: Catégorie non trouvée
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Admin requis

    delete:
      summary: Supprimer une catégorie
      description: |
        Supprimer une catégorie (authentification Admin requise).
        
        **Sécurité :**
        - Par défaut : Impossible de supprimer une catégorie qui contient des produits
        - Avec force=true : Suppression forcée même avec des produits (les produits deviennent orphelins)
        
        **Paramètres :**
        - `force` (query) : Si true, force la suppression même avec des produits
      tags:
        - Catégories
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID de la catégorie à supprimer
          required: true
          schema:
            type: string
            example: "cmdt0dip8000pztts37c03afa"
        - name: force
          in: query
          description: Forcer la suppression même si la catégorie contient des produits
          required: false
          schema:
            type: boolean
            default: false
            example: true
      responses:
        '200':
          description: Catégorie supprimée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Catégorie supprimée avec succès"
        '400':
          description: |
            Impossible de supprimer
            - La catégorie contient des produits (utilisez force=true pour forcer)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Impossible de supprimer une catégorie qui contient des produits"
                  suggestion:
                    type: string
                    example: "Utilisez le paramètre force=true pour forcer la suppression"
        '404':
          description: Catégorie non trouvée
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Admin requis

