                      $ref: '#/components/schemas/Adresse'

    post:
      summary: Créer une nouvelle adresse
      description: |
        Créer une nouvelle adresse de livraison (authentification Admin requise).
        
        **Validation :**
        - Le nom de l'adresse est obligatoire
        - La région est obligatoire
        - Les frais spécifiques sont optionnels
      tags:
        - Adresses
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nom
                - regionId
              properties:
                nom:
                  type: string
                  description: Nom de l'adresse
                  example: "Centre-ville Dakar"
                description:
                  type: string
                  description: Description de l'adresse
                  example: "Zone centrale de Dakar"
                codePostal:
                  type: string
                  description: Code postal
                  example: "DAK001"
                fraisLivraison:
                  type: number
                  description: Frais de livraison spécifiques à cette adresse (FCFA)
                  example: 0
                regionId:
                  type: string
                  description: ID de la région associée
                  example: "region-dakar"
      responses:
        '201':
          description: Adresse créée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Adresse créée avec succès"
                  data:
                    $ref: '#/components/schemas/Adresse'
        '400':
          description: |
            Données invalides
            - Le nom de l'adresse et la région sont obligatoires
            - Région introuvable
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Le nom de l'adresse et la région sont obligatoires"
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Admin requis

