  contact:
    name: Support API GIE
    email: support@gie-api.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.njabatech.com/api
    description: Serveur de production
  

tags:
  - name: Santé
    description: Endpoints de vérification de l'état de l'API
  - name: Authentification
    description: Endpoints d'authentification et gestion des utilisateurs
  - name: GIE
    description: Gestion des Groupements d'Intérêt Économique
  - name: Clients
    description: Gestion des clients
  - name: Produits
    description: Gestion des produits et catégories
  - name: Commandes
    description: Gestion des commandes classiques
  - name: Commandes Multi-GIE
    description: Gestion avancée des commandes multi-GIE avec coordination automatique
  - name: Paiements
    description: Gestion des paiements
  - name: Livreurs
    description: Gestion des livreurs et livraisons
  - name: Régions
    description: Gestion des régions et frais de livraison
  - name: Adresses
    description: Gestion des adresses de livraison

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Vérifier l'état de l'API
      description: Endpoint de santé pour vérifier que l'API fonctionne
      tags:
        - Santé
      responses:
        '200':
          description: API opérationnelle
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "API GIE Backend - Service opérationnel"
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: "1.0.0"

  /auth/admin/login:
    post:
      summary: Connexion administrateur
      description: Authentifier un administrateur et obtenir un token JWT
      tags:
        - Authentification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@gie.com"
                password:
                  type: string
                  example: "admin123"
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Connexion réussie"
                  data:
                    type: object
                    properties:
                      administrateur:
                        $ref: '#/components/schemas/Administrateur'
                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Données manquantes
        '401':
          description: Email ou mot de passe incorrect

  /auth/client/login:
    post:
      summary: Connexion client
      description: Authentifier un client et obtenir un token JWT
      tags:
        - Authentification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "client@example.com"
                password:
                  type: string
                  example: "client123"
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Connexion réussie"
                  data:
                    type: object
                    properties:
                      client:
                        $ref: '#/components/schemas/Client'
                      token:
                        type: string
                        example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Données manquantes
        '401':
          description: Email ou mot de passe incorrect

  /auth/admin/register:
    post:
      summary: Inscription administrateur
      description: Créer un nouvel administrateur (réservé aux super admins)
      tags:
        - Authentification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdministrateurDto'
      responses:
        '201':
          description: Administrateur créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Administrateur créé avec succès"
                  data:
                    $ref: '#/components/schemas/Administrateur'
        '400':
          description: Données invalides
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Super admin requis

  /auth/client/register:
    post:
      summary: Inscription client
      description: Créer un nouveau client (réservé aux admins)
      tags:
        - Authentification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientDto'
      responses:
        '201':
          description: Client créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Client créé avec succès"
                  data:
                    $ref: '#/components/schemas/Client'
        '400':
          description: Données invalides
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Admin requis


  /auth/verify-token:
    post:
      summary: Vérifier un token
      description: Vérifier la validité d'un token JWT
      tags:
        - Authentification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token valide
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Token valide"
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
        '401':
          description: Token invalide

  /auth/change-password:
    post:
      summary: Changer le mot de passe
      description: Changer le mot de passe de l'utilisateur connecté
      tags:
        - Authentification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  example: "ancienMotDePasse"
                newPassword:
                  type: string
                  example: "nouveauMotDePasse"
      responses:
        '200':
          description: Mot de passe modifié avec succès
        '400':
          description: Données invalides
        '401':
          description: Non autorisé

  /gies:
    get:
      summary: Récupérer tous les GIE
      description: Récupérer la liste des GIE avec pagination
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            default: 10
        - name: administrateurId
          in: query
          description: Filtrer par administrateur
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Liste des GIE récupérée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "GIE récupérés avec succès"
                  data:
                    type: object
                    properties:
                      gies:
                        type: array
                        items:
                          $ref: '#/components/schemas/GIE'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Non autorisé

    post:
      summary: Créer un GIE
      description: Créer un nouveau GIE
      tags:
        - GIE
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGIEDto'
      responses:
        '201':
          description: GIE créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "GIE créé avec succès"
                  data:
                    $ref: '#/components/schemas/GIE'
        '400':
          description: Données invalides
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Admin requis

  /gies/search:
    get:
      summary: Rechercher des GIE
      description: Rechercher des GIE par nom, description ou email
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Terme de recherche
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Recherche effectuée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Recherche effectuée avec succès"
                  data:
                    type: object
                    properties:
                      gies:
                        type: array
                        items:
                          $ref: '#/components/schemas/GIE'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '400':
          description: Terme de recherche requis
        '401':
          description: Non autorisé

  /gies/{id}:
    get:
      summary: Récupérer un GIE
      description: Récupérer les détails d'un GIE par son ID
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du GIE
          required: true
          schema:
            type: string
      responses:
        '200':
          description: GIE récupéré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "GIE récupéré avec succès"
                  data:
                    $ref: '#/components/schemas/GIE'
        '404':
          description: GIE non trouvé
        '401':
          description: Non autorisé

    put:
      summary: Mettre à jour un GIE
      description: Mettre à jour les informations d'un GIE
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du GIE
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGIEDto'
      responses:
        '200':
          description: GIE mis à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "GIE mis à jour avec succès"
                  data:
                    $ref: '#/components/schemas/GIE'
        '400':
          description: Données invalides
        '404':
          description: GIE non trouvé
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Admin requis

    delete:
      summary: Supprimer un GIE
      description: Supprimer un GIE
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du GIE
          required: true
          schema:
            type: string
      responses:
        '200':
          description: GIE supprimé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "GIE supprimé avec succès"
        '404':
          description: GIE non trouvé
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Admin requis

  /gies/{id}/status:
    patch:
      summary: Changer le statut d'un GIE
      description: Modifier le statut d'un GIE (ACTIF, INACTIF, SUSPENDU)
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du GIE
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - statut
              properties:
                statut:
                  type: string
                  enum: [ACTIF, INACTIF, SUSPENDU]
                  example: "ACTIF"
      responses:
        '200':
          description: Statut mis à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Statut du GIE mis à jour avec succès"
                  data:
                    $ref: '#/components/schemas/GIE'
        '400':
          description: Statut invalide
        '404':
          description: GIE non trouvé
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Admin requis

  /gies/{id}/stats:
    get:
      summary: Statistiques d'un GIE
      description: Récupérer les statistiques d'un GIE
      tags:
        - GIE
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du GIE
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Statistiques récupérées avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Statistiques récupérées avec succès"
                  data:
                    type: object
                    properties:
                      totalProduits:
                        type: integer
                        example: 25
                      totalCommandes:
                        type: integer
                        example: 150
                      totalVentes:
                        type: number
                        example: 12500.50
        '404':
          description: GIE non trouvé
        '401':
          description: Non autorisé
        '403':
          description: Accès refusé - Admin requis

  /produits:
    get:
      summary: Récupérer tous les produits
      description: Récupérer la liste des produits avec pagination
      tags:
        - Produits
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            default: 10
        - name: gieId
          in: query
          description: Filtrer par GIE
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Liste des produits récupérée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Produits récupérés avec succès"
                  data:
                    type: object
                    properties:
                      produits:
                        type: array
                        items:
                          $ref: '#/components/schemas/Produit'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Non autorisé

    post:
      summary: Créer un produit
