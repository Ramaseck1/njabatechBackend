        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Client ou Admin requis

    put:
      summary: Mettre à jour le statut d'une commande
      description: |
        Modifier le statut d'une commande (authentification Admin requise).
        
        **Statuts possibles :**
        - EN_ATTENTE : Commande en attente de confirmation
        - CONFIRMEE : Commande confirmée
        - EN_PREPARATION : Commande en cours de préparation
        - EXPEDIEE : Commande expédiée
        - LIVREE : Commande livrée
        - ANNULEE : Commande annulée
      tags:
        - Commandes
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID de la commande à modifier
          required: true
          schema:
