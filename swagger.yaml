  /commandes:
    get:
      summary: Récupérer toutes les commandes
      description: |
        Récupérer la liste de toutes les commandes avec pagination et filtres.
        
        **Fonctionnalités :**
        - Liste paginée des commandes
        - Tri par date de commande (plus récentes en premier)
        - Filtres par statut, client, région
        - Inclut les informations de livraison et frais
      tags:
        - Commandes
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Numéro de page
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Nombre d'éléments par page
          required: false
          schema:
            type: integer
            default: 20
        - name: statut
          in: query
          description: Filtrer par statut de commande
          required: false
          schema:
            type: string
            enum: [EN_ATTENTE, CONFIRMEE, EN_PREPARATION, EXPEDIEE, LIVREE, ANNULEE]
        - name: clientId
          in: query
          description: Filtrer par ID du client
          required: false
          schema:
            type: string
        - name: regionId
          in: query
          description: Filtrer par région de livraison (optionnel - si non fourni, toutes les commandes sont retournées)
          required: false
          schema:
            type: string
            example: "region-dakar"
      responses:
        '200':
          description: Liste des commandes récupérée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Commandes récupérées avec succès"
                  data:
                    type: object
                    properties:
                      commandes:
                        type: array
                        items:
                          $ref: '#/components/schemas/Commande'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Admin requis

    post:
      summary: Créer une nouvelle commande
      description: |
        Créer une nouvelle commande avec calcul automatique des frais de livraison.
        
        **Fonctionnalités :**
        - Calcul automatique des frais de livraison selon la région
        - Validation des produits et quantités
        - Création automatique du paiement associé
        - Génération automatique du numéro de commande
        
        **Calcul des frais de livraison :**
        - Même région : frais de livraison interne
        - Régions différentes : frais de livraison externe
        - Frais spécifiques par adresse (optionnel)
      tags:
        - Commandes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - clientId
                - produits
              properties:
                clientId:
                  type: string
                  description: ID du client qui passe la commande
                  example: "client-123"
                regionLivraisonId:
                  type: string
                  description: ID de la région de livraison (optionnel, calculé automatiquement si non fourni)
                  example: "region-dakar"
                adresseLivraison:
                  type: string
                  description: Adresse de livraison détaillée
                  example: "Centre-ville Dakar, 123 Rue de la Paix, Dakar"
                produits:
                  type: array
                  description: Liste des produits commandés
                  items:
                    type: object
                    required:
                      - produitId
                      - quantite
                    properties:
                      produitId:
                        type: string
                        description: ID du produit
                        example: "produit-1"
                      quantite:
                        type: integer
                        minimum: 1
                        description: Quantité commandée
                        example: 2
      responses:
        '201':
          description: Commande créée avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Commande créée avec succès"
                  data:
                    $ref: '#/components/schemas/Commande'
        '400':
          description: |
            Données invalides
            - Client introuvable
            - Produit introuvable ou stock insuffisant
            - Région de livraison introuvable
            - Quantité invalide
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Produit introuvable ou stock insuffisant"
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Client requis

