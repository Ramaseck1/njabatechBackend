      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - statut
              properties:
                statut:
                  type: string
                  enum: [EN_ATTENTE, CONFIRMEE, EN_PREPARATION, EXPEDIEE, LIVREE, ANNULEE]
                  description: Nouveau statut de la commande
                  example: "CONFIRMEE"
                dateLivraison:
                  type: string
                  format: date-time
                  description: Date de livraison prévue (optionnel)
                  example: "2024-01-15T10:00:00.000Z"
      responses:
        '200':
          description: Statut de la commande mis à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Statut de la commande mis à jour avec succès"
                  data:
                    $ref: '#/components/schemas/Commande'
        '400':
          description: |
            Données invalides
