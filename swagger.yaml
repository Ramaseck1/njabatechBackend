        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - regionSourceId
                - regionDestinationId
              properties:
                regionSourceId:
                  type: string
                  description: ID de la région source (GIE)
                  example: "region-dakar"
                regionDestinationId:
                  type: string
                  description: ID de la région de destination (livraison)
                  example: "region-saint-louis"
      responses:
        '200':
          description: Frais de livraison calculés avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Frais de livraison calculés avec succès"
                  data:
                    type: object
                    properties:
                      fraisLivraison:
                        type: number
                        description: Frais de livraison en FCFA
                        example: 2000
        '400':
          description: |
            Données invalides
            - Les IDs des régions sont obligatoires
            - Région source ou destination introuvable
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Les IDs des régions source et destination sont obligatoires"

