                  data:
                    $ref: '#/components/schemas/Produit'
        '404':
          description: Produit non trouvé
        '401':
          description: Non autorisé

    put:
      summary: Mettre à jour un produit
      description: |
        Mettre à jour les informations d'un produit avec support des images Cloudinary.
        
        **Fonctionnalités :**
        - Mise à jour des données du produit (nom, description, prix, stock, catégorie)
        - Upload de nouvelle image (optionnel) - remplace automatiquement l'ancienne
        - Conservation de l'image existante si aucune nouvelle image n'est fournie
        - Suppression automatique de l'ancienne image de Cloudinary lors de l'upload d'une nouvelle
        
        **Formats d'image supportés :** JPG, PNG, GIF, WebP
        **Taille maximale :** 10MB
      tags:
        - Produits
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          description: ID du produit à mettre à jour
          required: true
          schema:
            type: string
            example: "123e4567-e89b-12d3-a456-426614174000"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                nom:
                  type: string
                  description: Nom du produit
                  example: "Tomates Bio Mises à Jour"
                description:
                  type: string
                  description: Description du produit
                  example: "Tomates biologiques fraîches du jardin - nouvelle récolte"
                prix:
                  type: number
                  format: float
                  description: Prix du produit (doit être > 0)
                  example: 3.50
                stock:
                  type: integer
                  description: Quantité en stock (doit être >= 0)
                  example: 75
                categorieId:
                  type: string
                  description: ID de la catégorie du produit (optionnel)
                  example: "cat-1"
                image:
                  type: string
                  format: binary
                  description: |
                    Nouvelle image du produit (optionnel).
                    Si fournie, remplace automatiquement l'ancienne image.
                    Si non fournie, l'image existante est conservée.
            encoding:
              image:
                contentType: image/*
      responses:
        '200':
          description: Produit mis à jour avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Produit mis à jour avec succès"
                  data:
                    $ref: '#/components/schemas/Produit'
        '400':
          description: |
            Données invalides
            - Prix négatif ou égal à zéro
            - Stock négatif
            - Catégorie non trouvée (categorieId invalide)
            - Erreur lors de l'upload d'image
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Le prix doit être supérieur à 0"
                  error:
                    type: string
                    example: "Erreur lors de l'upload de l'image"
        '403':
          description: |
            Accès refusé
            - Le produit ne vous appartient pas (seul le GIE propriétaire peut modifier)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Accès refusé. Ce produit ne vous appartient pas."
        '404':
          description: Produit non trouvé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Produit non trouvé"
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '500':
          description: Erreur serveur
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Erreur lors de la mise à jour du produit"
                  error:
                    type: string
                    example: "Erreur interne du serveur"

