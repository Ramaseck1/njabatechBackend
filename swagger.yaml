      description: |
        Créer un nouveau livreur. **Réservé aux administrateurs uniquement.**
        
        **Fonctionnalités :**
        - Validation des données
        - Hashage automatique du mot de passe
        - Association avec une région (optionnel)
        - Vérification de l'unicité de l'email
        - Attribution automatique du statut DISPONIBLE
        
        **Processus de création :**
        1. L'admin crée le compte livreur
        2. Le livreur reçoit ses identifiants
        3. Le livreur peut se connecter via l'app mobile
        4. Le livreur peut voir et accepter les commandes
      tags:
        - Livreurs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLivreurDto'
      responses:
        '201':
          description: Livreur créé avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Livreur créé avec succès"
                  data:
                    $ref: '#/components/schemas/Livreur'
        '400':
          description: |
            Données invalides
            - Email déjà utilisé
            - Région introuvable
            - Données manquantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Email déjà utilisé"
        '401':
          description: Non autorisé - Token JWT manquant ou invalide
        '403':
          description: Accès refusé - Admin requis

