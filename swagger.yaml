openapi: 3.0.3
info:
  title: GIE Backend API
  description: |
    API pour la gestion des GIE (Groupement d'Intérêt Économique)
    
    ## Fonctionnalités principales
    - Authentification administrateur, client et livreur
    - Gestion des GIE
    - Gestion des clients
    - Gestion des livreurs et livraisons
    - Gestion des catégories de produits
    - Gestion des produits
    - Gestion des commandes
    - Gestion des paiements
    - Gestion des régions et frais de livraison
    - Gestion des adresses de livraison
    
    ## 🏢 Système Multi-GIE (Nouveau)
    L'API gère maintenant un système avancé de commandes multi-GIE avec coordination automatique :
    
    ### Fonctionnalités Multi-GIE
    - **Notifications automatiques** : Chaque GIE reçoit un SMS quand une commande arrive
    - **Statuts par GIE** : Chaque produit a son propre statut (EN_ATTENTE, EN_PREPARATION, PRET, ANNULE)
    - **Statut global intelligent** : Calculé automatiquement selon les statuts individuels
    - **Notifications client intelligentes** : SMS envoyé seulement quand TOUS les GIE sont prêts
    - **Gestion des annulations partielles** : Possibilité d'annuler des produits spécifiques
    
    ### Flux Multi-GIE
    1. **Client commande** → Notifications envoyées à tous les GIE concernés
    2. **GIE traitent** → Chaque GIE marque ses produits (EN_PREPARATION → PRET)
    3. **Système vérifie** → Si tous les GIE sont prêts, notification automatique au client
    4. **Livraison** → Commande prête pour la livraison
    
    ### Exemple de commande multi-GIE
    ```json
    {
      "produits": [
        {"produitId": "tomates_gie_a", "quantite": 2, "prixUnitaire": 500},
        {"produitId": "oranges_gie_b", "quantite": 3, "prixUnitaire": 300}
      ]
    }
    ```
    - **GIE A** reçoit : "Nouvelle commande #CMD-123 ! Produits: 2x Tomates"
    - **GIE B** reçoit : "Nouvelle commande #CMD-123 ! Produits: 3x Oranges"
    - **Client** reçoit : "Votre commande #CMD-123 est prête !" (seulement quand tous prêts)
    
    ## Authentification
    L'API utilise JWT pour l'authentification. Incluez le token dans le header Authorization :
    ```
    Authorization: Bearer <your-jwt-token>
    ```
    
    ## Rôles
    - **SUPER_ADMIN** : Accès complet à toutes les fonctionnalités
    - **ADMIN** : Gestion des GIE, clients, livreurs, produits et commandes
    - **CLIENT** : Accès limité à ses propres données
    - **LIVREUR** : Gestion des livraisons et commandes assignées
    
    ## Gestion des images
    L'API supporte l'upload d'images pour les produits via Cloudinary :
    - **Formats supportés** : JPG, PNG, GIF, WebP
    - **Taille maximale** : 10MB
    - **Stockage** : Images optimisées et sécurisées sur Cloudinary
    - **URLs** : Format HTTPS avec versioning automatique
    
    ## Système de frais de livraison
    L'API gère automatiquement les frais de livraison basés sur les régions :
    - **Frais interne** : 500 FCFA (même région)
    - **Frais externe** : 2000 FCFA (régions différentes)
    - **Frais spécifiques** : Par adresse (optionnel)
    
    ### Régions disponibles
    - **Dakar** : Capitale et environs
    - **Saint-Louis** : Région nord
    - **Mbour** : Région côtière
    
    ### Exemple d'utilisation avec images
    ```bash
    # Mise à jour d'un produit avec nouvelle image
    curl -X PUT \
      http://localhost:3003/api/produits/123e4567-e89b-12d3-a456-426614174000 \
      -H 'Authorization: Bearer <your-jwt-token>' \
      -F 'nom=Nouveau nom' \
      -F 'prix=29.99' \
      -F 'image=@/path/to/image.jpg'
    ```
    
    ### Exemple de calcul des frais de livraison
    ```bash
    # Calculer les frais entre deux régions
    curl -X POST \
      http://localhost:3003/api/regions/calculate-frais-livraison \
      -H 'Content-Type: application/json' \
      -d '{
        "regionSourceId": "region-dakar-id",
        "regionDestinationId": "region-saint-louis-id"
      }'
    ```
    
    ## Système de livraison centralisé
    L'API gère un système complet de livraison centralisé avec livreurs :
    
    ### Gestion des livreurs (Admin uniquement)
    - **Création de livreurs** : Seuls les administrateurs peuvent créer des comptes livreur
    - **Gestion de l'équipe** : L'admin peut voir, modifier et supprimer les livreurs
    - **Affectation des régions** : L'admin assigne les livreurs aux régions
    - **Contrôle des statuts** : L'admin peut bloquer/débloquer les livreurs
    
    ### Service de livraison centralisé
    - **Accès universel** : Les livreurs voient toutes les commandes de tous les GIE
    - **Aucun filtre** : Toutes les commandes sont visibles par défaut
    - **Service centralisé** : Pas de restriction par région
    - **Choix libre** : Les livreurs choisissent les commandes à livrer
    - **Contact direct** : Informations GIE et client pour chaque commande
    
    ### Fonctionnalités livreur
    - **Authentification livreur** : Login dédié avec JWT
    - **Vue d'ensemble** : Toutes les commandes disponibles en temps réel
    - **Gestion des commandes** : Assignation et suivi des livraisons
    - **Statuts de livreur** : DISPONIBLE, EN_LIVRAISON, INDISPONIBLE, BLOQUE
    - **Communication** : Appels directs aux GIE et clients
    - **Suivi complet** : Du statut de la commande à la livraison
    
    ### Exemple d'authentification livreur
    ```bash
    # Connexion d'un livreur
    curl -X POST \
      http://localhost:3003/api/livreurs/login \
      -H 'Content-Type: application/json' \
      -d '{
        "email": "moussa.diop@livraison.com",
        "password": "password123"
      }'
    ```
    
    ### Exemple de récupération des commandes disponibles
    ```bash
    # Récupérer toutes les commandes disponibles (tous GIE)
    curl -X GET \
      'http://localhost:3003/api/livreurs/commandes-disponibles?page=1&limit=20' \
      -H 'Authorization: Bearer <livreur-jwt-token>'
    ```
    
    ### Exemple d'assignation de commande
    ```bash
    # Assigner une commande à un livreur (livreurId extrait du token JWT)
    curl -X POST \
      http://localhost:3003/api/livreurs/assigner-commande \
      -H 'Content-Type: application/json' \
      -H 'Authorization: Bearer <livreur-jwt-token>' \
      -d '{
        "commandeId": "commande-456"
      }'
    ```
    
    ### Exemple de marquage comme livrée
    ```bash
    # Marquer une commande comme livrée (livreurId extrait du token JWT)
    curl -X POST \
      http://localhost:3003/api/livreurs/marquer-livree \
      -H 'Content-Type: application/json' \
      -H 'Authorization: Bearer <livreur-jwt-token>' \
      -d '{
        "commandeId": "commande-456"
      }'
    ```
    
    ### Dépannage des erreurs courantes
    
    #### Erreur "Token invalide ou livreur non authentifié"
    - Vérifiez que le livreur est correctement authentifié
    - Assurez-vous que le token JWT est valide et non expiré
    - Vérifiez que le token contient bien l'ID du livreur
    
    #### Erreur "Commande introuvable ou non assignée à ce livreur"
    - Vérifiez que la commande existe
    - Assurez-vous que la commande est bien assignée au livreur
    - Vérifiez que l'ID de la commande est correct
    
    #### Erreur "Network request failed" (React Native)
    - Vérifiez que le backend est accessible depuis l'émulateur
    - Utilisez `10.0.2.2:3003` pour Android Emulator
    - Vérifiez que le port 3003 est ouvert
